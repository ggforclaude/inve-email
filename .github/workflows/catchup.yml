name: 투자뉴스 캐치업 (4/1~4/19)

on:
  workflow_dispatch:   # 수동으로 한 번만 실행

jobs:
  catchup:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 19일치 × 처리시간

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: invest_telegram/requirements.txt

      - name: 패키지 설치
        run: |
          pip install -r invest_telegram/requirements.txt
          sudo apt-get install -y fonts-nanum
          fc-cache -fv

      - name: 캐치업 실행 (2026-04-01 ~ 2026-04-19)
        working-directory: invest_telegram
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_CHANNELS: ${{ secrets.TELEGRAM_CHANNELS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py --catchup
